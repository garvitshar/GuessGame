<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guess The Number</title>
  <link rel="stylesheet" href="guess.css">
</head>
<body>

  <div class="game-container">

    <h1>🎯 Guess The Number</h1>
    <p class="subtitle">Guess a number between <strong>1 and 100</strong></p>

    <!-- Input Section -->
    <div class="input-box">
      <input 
        type="number" 
        id="guessInput" 
        placeholder="Enter your guess"
        min="1"
        max="100"
      />
      <button id="submitGuess">Submit</button>
    </div>

    <!-- Feedback Message -->
    <p id="message"></p>

    <!-- Game Info -->
    <div class="game-info">

      <div class="info-box">
        <h3>Previous Guesses</h3>
        <p id="previousGuesses">—</p>
      </div>

      <div class="info-box">
        <h3>Guesses Remaining</h3>
        <p id="remainingGuesses">10</p>
      </div>

    </div>

    <!-- Restart (optional for later) -->
    <button id="restartGame" class="hidden">Restart Game</button>

  </div>

</body>
</html>
